app = "panel-d1jl9g"
primary_region = "fra"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256
[env]
  DATA_DIR = "/app/data"

[mounts]
  source = "pushprospect_data"
  destination = "/app/data"
